<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wan Syafiq | AI Developer Portfolio</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__inner max-container">
        <a href="#home" class="header__logo">
          <img
            src="./Images/Escanor7dso.png"
            class="header__logo__img"
            alt="logo"
          />
          <span class="header__logo__title">Wan Syafiq</span>
        </a>
        <input
          type="checkbox"
          id="nav-toggle"
          class="header__checkbox"
          aria-hidden="true"
        />
        <label
          for="nav-toggle"
          class="header__toggle"
          aria-label="Open/Close Menu"
        >
          <span class="header__icon header__icon--open" aria-hidden="true"
            >=</span
          >
          <span class="header__icon header__icon--close" aria-hidden="true"
            >x</span
          >
        </label>
        <nav class="header__nav">
          <ul class="header__menu">
            <li><a href="#home" class="header__menu__item active">Home</a></li>
            <li>
              <a href="#about" class="header__menu__item active"
                >Self introduction</a
              >
            </li>
            <li>
              <a href="#skills" class="header__menu__item active">Skills</a>
            </li>
            <li>
              <a href="#work" class="header__menu__item active">Portfolio</a>
            </li>
            <li>
              <a href="#license" class="header__menu__item active"
                >Certifications</a
              >
            </li>
            <li>
              <a href="#contact" class="header__menu__item active"
                >Contact information</a
              >
            </li>
          </ul>
        </nav>
      </div>
    </header>
  </body>
</html>
